<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="帯広エリアの金融機関の住宅ローン金利を、種別ごとに過去まで遡れる金利履歴ビューアー">
  <title>金利履歴ビューアー｜FinPulse</title>
  <style>
    :root {
      --navy-950: #0b1f33;
      --navy-900: #102a43;
      --navy-800: #173e5e;
      --teal-700: #0d6e6e;
      --teal-600: #138484;
      --teal-100: #dff3f1;
      --up: #c0392b;
      --up-bg: #fdecea;
      --down: #0d6e6e;
      --down-bg: #e3f4f1;
      --ink: #172b3a;
      --muted: #647684;
      --line: #d9e2e8;
      --paper: #ffffff;
      --canvas: #f4f7f8;
      --shadow: 0 10px 30px rgba(11, 31, 51, 0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    html { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--canvas);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      line-height: 1.4;
    }
    button, input { font: inherit; }
    button { color: inherit; }

    .site-header {
      padding: 16px clamp(16px, 4vw, 48px);
      color: #eef7fa;
      background:
        radial-gradient(circle at 12% 0%, rgba(32, 144, 139, 0.32), transparent 34%),
        var(--navy-950);
    }
    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 750;
      letter-spacing: 0.02em;
    }
    .pulse-dot {
      width: 11px; height: 11px; border-radius: 50%;
      background: #55d6c9; box-shadow: 0 0 0 5px rgba(85, 214, 201, 0.15);
    }
    .site-header p { margin: 6px 0 0; color: #a9c0ce; font-size: 0.85rem; }
    .demo-flag {
      display: inline-block;
      margin-left: 10px;
      padding: 2px 9px;
      color: #7a4b00;
      background: #ffd98a;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 800;
      vertical-align: middle;
    }

    .controls {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 10px clamp(16px, 4vw, 48px);
      background: rgba(244, 247, 248, 0.95);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .search-wrap { position: relative; flex: 1 1 260px; }
    .search-icon {
      position: absolute; left: 13px; top: 50%;
      color: var(--muted); transform: translateY(-50%); pointer-events: none;
    }
    #searchInput {
      width: 100%;
      padding: 7px 13px 7px 38px;
      color: var(--ink); background: var(--paper);
      border: 1px solid var(--line); border-radius: 11px; outline: none;
    }
    #searchInput:focus { border-color: var(--teal-600); box-shadow: 0 0 0 3px rgba(19,132,132,0.13); }

    .type-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 6px 12px;
      color: var(--navy-800); background: var(--paper);
      border: 1px solid var(--line); border-radius: 999px; cursor: pointer;
      font-size: 0.85rem; font-weight: 700;
    }
    .chip.active { color: #fff; background: var(--teal-700); border-color: var(--teal-700); }

    .filter-menu { position: relative; }
    .control-button {
      display: inline-flex; align-items: center; gap: 7px;
      min-height: 36px; padding: 6px 12px; white-space: nowrap;
      background: var(--paper); border: 1px solid var(--line); border-radius: 11px; cursor: pointer;
    }
    .control-button:hover { border-color: #a9bbc7; }
    .filter-popover {
      position: absolute; right: 0; top: calc(100% + 8px); z-index: 40;
      display: none; width: 250px; max-height: 320px; overflow-y: auto;
      padding: 10px; background: var(--paper);
      border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow);
    }
    .filter-popover.open { display: block; }
    .filter-option { display: flex; align-items: center; gap: 9px; padding: 4px 3px; cursor: pointer; font-size: 0.88rem; }
    .filter-option input { accent-color: var(--teal-700); }

    .legend {
      display: flex; flex-wrap: wrap; gap: 14px;
      padding: 8px clamp(16px, 4vw, 48px) 0;
      color: var(--muted); font-size: 0.78rem;
    }
    .legend b { font-weight: 700; }
    .legend .up { color: var(--up); }
    .legend .down { color: var(--down); }

    .content { padding: 12px clamp(16px, 4vw, 48px) 40px; }

    .table-scroll {
      overflow-x: auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 4px 18px rgba(11, 31, 51, 0.045);
    }
    table { border-collapse: separate; border-spacing: 0; width: 100%; }
    thead th {
      position: sticky; top: 0; z-index: 5;
      padding: 9px 12px;
      color: var(--muted); background: #f7fafa;
      font-size: 0.74rem; font-weight: 750; letter-spacing: 0.03em;
      text-align: center; white-space: nowrap;
      border-bottom: 1px solid var(--line);
    }
    thead th.col-bank, thead th.col-type { text-align: left; z-index: 7; }
    tbody td {
      padding: 8px 12px; vertical-align: top;
      border-bottom: 1px solid #eef2f4;
      text-align: center; white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover td { background: #fbfdfd; }

    /* 左側の固定列（機関・商品・種別） */
    .col-bank { position: sticky; left: 0; z-index: 4; width: 210px; min-width: 210px; text-align: left; background: var(--paper); box-shadow: 6px 0 10px -10px rgba(15,23,42,0.2); }
    .col-type { position: sticky; left: 210px; z-index: 4; width: 92px; min-width: 92px; text-align: left; background: var(--paper); box-shadow: 6px 0 10px -10px rgba(15,23,42,0.2); }
    thead th.col-bank { left: 0; background: #f7fafa; }
    thead th.col-type { left: 210px; background: #f7fafa; }
    tbody tr:hover .col-bank, tbody tr:hover .col-type { background: #fbfdfd; }

    .bank-name { font-weight: 700; color: var(--navy-900); }
    .bank-name a { color: var(--navy-800); text-decoration: none; }
    .bank-name a:hover { color: var(--teal-700); text-decoration: underline; }
    .product-name { margin-top: 1px; color: var(--muted); font-size: 0.76rem; white-space: normal; }

    .type-badge {
      display: inline-block; padding: 2px 9px; border-radius: 999px;
      background: var(--teal-100); color: var(--teal-700);
      font-size: 0.76rem; font-weight: 750;
    }

    .rate-cell.current { background: var(--teal-100); }
    .rate-val { font-size: 0.98rem; font-weight: 750; color: var(--navy-900); }
    .rate-since { margin-top: 2px; color: var(--muted); font-size: 0.7rem; }
    .rate-cell.up .rate-val { color: var(--up); }
    .rate-cell.down .rate-val { color: var(--down); }
    .arrow { font-size: 0.82rem; }
    .rate-cell.up .arrow { color: var(--up); }
    .rate-cell.down .arrow { color: var(--down); }
    .rate-empty { color: #c2ccd2; }
    .best-badge {
      display: inline-block; margin-top: 3px; padding: 1px 7px;
      background: #d59b2b; color: #fff;
      border-radius: 999px; font-size: 0.64rem; font-weight: 800; letter-spacing: 0.02em;
    }
    .rate-cell.best { background: #fff4d8; box-shadow: inset 0 0 0 1px #e6b84b; }

    /* 機関の変わり目を太い罫線で区切る */
    tbody tr.bank-start > td { border-top: 2px solid #8aa0af; }

    .empty-state, .loading-state {
      padding: 40px 20px; text-align: center; color: var(--muted);
      background: var(--paper); border: 1px dashed #b9c8d1; border-radius: var(--radius);
    }
    .empty-state strong, .loading-state strong { display: block; margin-bottom: 5px; color: var(--navy-900); font-size: 1rem; }

    @media (max-width: 640px) {
      .col-bank { width: 150px; min-width: 150px; }
      .col-type { left: 150px; width: 72px; min-width: 72px; }
      thead th.col-type { left: 150px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="brand-mark"><span class="pulse-dot" aria-hidden="true"></span>金利履歴ビューアー<span id="demoFlag" class="demo-flag" hidden>デモ表示</span></div>
    <p id="subtitle">帯広エリア 金融機関の住宅ローン金利を、種別ごとに過去まで遡って確認できます。左が最新、右が過去です。</p>
  </header>

  <div class="controls">
    <label class="search-wrap">
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input id="searchInput" type="search" placeholder="金融機関・商品名で検索" aria-label="金融機関・商品名で検索" autocomplete="off">
    </label>
    <div class="type-chips" id="typeChips" aria-label="金利種別フィルター"></div>
    <div class="filter-menu" id="bankFilterWrap">
      <button class="control-button" id="filterButton" type="button" aria-expanded="false" aria-controls="filterPopover">
        機関を絞り込む <span id="filterCount"></span>
      </button>
      <div class="filter-popover" id="filterPopover">
        <div id="bankFilters"></div>
      </div>
    </div>
  </div>

  <div class="legend">
    <span><b>各セル</b>＝その時点の金利と適用開始日（「〜」＝その日以降）</span>
    <span class="up"><b>↑</b> 前より上昇</span>
    <span class="down"><b>↓</b> 前より低下</span>
  </div>

  <div class="content">
    <div id="matrix" aria-live="polite">
      <div class="loading-state"><strong>データを読み込んでいます</strong>しばらくお待ちください。</div>
    </div>
  </div>

  <script>
    "use strict";

    const DATA_URL = "./data/rate-history.json";
    const state = {
      data: null,
      search: "",
      selectedTypes: new Set(),
      selectedBanks: new Set(),
    };

    const el = {
      matrix: document.getElementById("matrix"),
      searchInput: document.getElementById("searchInput"),
      typeChips: document.getElementById("typeChips"),
      bankFilters: document.getElementById("bankFilters"),
      filterButton: document.getElementById("filterButton"),
      filterPopover: document.getElementById("filterPopover"),
      filterCount: document.getElementById("filterCount"),
      demoFlag: document.getElementById("demoFlag"),
    };

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>'"]/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
      })[c]);
    }

    function safeUrl(value) {
      try {
        const url = new URL(value);
        return ["http:", "https:"].includes(url.protocol) ? escapeHtml(url.href) : "";
      } catch (_e) {
        return "";
      }
    }

    function fmtRate(rate) {
      const n = Number(rate);
      return Number.isFinite(n) ? n.toFixed(3) + "%" : escapeHtml(String(rate ?? "—"));
    }

    function fmtSince(date) {
      const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(date ?? ""));
      return m ? `${m[1]}/${m[2]}/${m[3]}〜` : escapeHtml(String(date ?? ""));
    }

    function typeLabel(rateType) {
      return (state.data.rate_type_labels || {})[rateType] || rateType;
    }

    function bankOrder() {
      // JSON内での機関の初出順を機関の並び順とする
      const order = [];
      for (const row of state.data.rows) {
        if (!order.includes(row.bank_id)) order.push(row.bank_id);
      }
      return order;
    }

    function sortedRows(rows) {
      const banks = bankOrder();
      const typeOrder = state.data.rate_type_order || [];
      return [...rows].sort((a, b) => {
        const bi = banks.indexOf(a.bank_id) - banks.indexOf(b.bank_id);
        if (bi !== 0) return bi;
        if (a.product_id !== b.product_id) return String(a.product_id).localeCompare(String(b.product_id));
        return typeOrder.indexOf(a.rate_type) - typeOrder.indexOf(b.rate_type);
      });
    }

    function visibleRows() {
      const q = state.search.trim().toLocaleLowerCase("ja");
      return state.data.rows.filter((row) => {
        if (!state.selectedTypes.has(row.rate_type)) return false;
        if (!state.selectedBanks.has(row.bank_id)) return false;
        if (!q) return true;
        return (
          String(row.bank_name ?? "").toLocaleLowerCase("ja").includes(q) ||
          String(row.product_name ?? "").toLocaleLowerCase("ja").includes(q)
        );
      });
    }

    function rateCell(entry, older, isCurrent, isBest) {
      if (!entry) return '<td class="rate-cell"><span class="rate-empty">—</span></td>';
      let dir = "";
      let arrow = "";
      if (older && Number.isFinite(Number(entry.rate)) && Number.isFinite(Number(older.rate))) {
        if (Number(entry.rate) > Number(older.rate)) { dir = "up"; arrow = " <span class=\"arrow\">↑</span>"; }
        else if (Number(entry.rate) < Number(older.rate)) { dir = "down"; arrow = " <span class=\"arrow\">↓</span>"; }
      }
      const cls = ["rate-cell", isCurrent ? "current" : "", isBest ? "best" : "", dir].filter(Boolean).join(" ");
      const badge = isBest ? '<div class="best-badge">最安</div>' : "";
      return `<td class="${cls}">
        <div class="rate-val">${fmtRate(entry.rate)}${arrow}</div>
        <div class="rate-since">${fmtSince(entry.effective_from)}</div>
        ${badge}
      </td>`;
    }

    function minRateByType(rows) {
      // 表示中の行から、金利種別ごとの「現在」列の最安値を求める
      const min = {};
      for (const row of rows) {
        const cur = (row.history || [])[0];
        if (!cur || !Number.isFinite(Number(cur.rate))) continue;
        const t = row.rate_type;
        const v = Number(cur.rate);
        if (!(t in min) || v < min[t]) min[t] = v;
      }
      return min;
    }

    function render() {
      const rows = sortedRows(visibleRows());
      if (!rows.length) {
        el.matrix.innerHTML = '<div class="empty-state"><strong>該当する金利がありません</strong>検索語・種別・機関の絞り込みを変えてください。</div>';
        return;
      }
      const maxLen = rows.reduce((m, r) => Math.max(m, (r.history || []).length), 1);
      const headCols = [];
      for (let i = 0; i < maxLen; i += 1) {
        headCols.push(i === 0 ? "現在" : (i === 1 ? "前回" : `${i}回前`));
      }

      const minByType = minRateByType(rows);

      const thead = `<tr>
        <th class="col-bank">金融機関・商品</th>
        <th class="col-type">種別</th>
        ${headCols.map((label) => `<th>${escapeHtml(label)}</th>`).join("")}
      </tr>`;

      const body = rows.map((row, idx) => {
        const prev = rows[idx - 1];
        // 機関の変わり目（太い罫線を引く行）
        const isBankStart = Boolean(prev) && prev.bank_id !== row.bank_id;
        // 機関名セルは(機関×商品)単位で結合する。グループ先頭でのみ出力。
        const groupStart = !prev || prev.bank_id !== row.bank_id || prev.product_id !== row.product_id;

        const history = row.history || [];
        const cur = history[0];
        const isBest = Boolean(cur) && Number.isFinite(Number(cur.rate)) && Number(cur.rate) === minByType[row.rate_type];

        const cells = [];
        for (let i = 0; i < maxLen; i += 1) {
          cells.push(rateCell(history[i], history[i + 1], i === 0, i === 0 && isBest));
        }

        let bankCell = "";
        if (groupStart) {
          let span = 1;
          for (let j = idx + 1; j < rows.length; j += 1) {
            if (rows[j].bank_id === row.bank_id && rows[j].product_id === row.product_id) span += 1;
            else break;
          }
          const url = row.url ? safeUrl(row.url) : "";
          const bankHtml = url
            ? `<a href="${url}" target="_blank" rel="noopener noreferrer">${escapeHtml(row.bank_name)}</a>`
            : escapeHtml(row.bank_name);
          bankCell = `<td class="col-bank" rowspan="${span}">
            <div class="bank-name">${bankHtml}</div>
            <div class="product-name">${escapeHtml(row.product_name || "")}</div>
          </td>`;
        }

        return `<tr${isBankStart ? ' class="bank-start"' : ""}>
          ${bankCell}
          <td class="col-type"><span class="type-badge">${escapeHtml(typeLabel(row.rate_type))}</span></td>
          ${cells.join("")}
        </tr>`;
      }).join("");

      el.matrix.innerHTML = `<div class="table-scroll"><table><thead>${thead}</thead><tbody>${body}</tbody></table></div>`;
    }

    function buildTypeChips() {
      const order = state.data.rate_type_order || [];
      state.selectedTypes = new Set(order);
      el.typeChips.innerHTML = order.map((t) =>
        `<button type="button" class="chip active" data-type="${escapeHtml(t)}">${escapeHtml(typeLabel(t))}</button>`
      ).join("");
    }

    function buildBankFilters() {
      const seen = new Map();
      for (const row of state.data.rows) {
        if (!seen.has(row.bank_id)) seen.set(row.bank_id, row.bank_name);
      }
      state.selectedBanks = new Set(seen.keys());
      el.bankFilters.innerHTML = [...seen.entries()].map(([id, name]) =>
        `<label class="filter-option"><input type="checkbox" value="${escapeHtml(id)}" checked> ${escapeHtml(name)}</label>`
      ).join("");
      updateFilterCount();
    }

    function updateFilterCount() {
      const total = new Set(state.data.rows.map((r) => r.bank_id)).size;
      el.filterCount.textContent = total ? `(${state.selectedBanks.size}/${total})` : "";
    }

    el.searchInput.addEventListener("input", () => { state.search = el.searchInput.value; render(); });

    el.typeChips.addEventListener("click", (event) => {
      const chip = event.target.closest("[data-type]");
      if (!chip) return;
      const type = chip.dataset.type;
      if (state.selectedTypes.has(type)) state.selectedTypes.delete(type);
      else state.selectedTypes.add(type);
      chip.classList.toggle("active");
      render();
    });

    el.filterButton.addEventListener("click", () => {
      const open = el.filterPopover.classList.toggle("open");
      el.filterButton.setAttribute("aria-expanded", String(open));
    });

    el.bankFilters.addEventListener("change", (event) => {
      if (event.target.type !== "checkbox") return;
      if (event.target.checked) state.selectedBanks.add(event.target.value);
      else state.selectedBanks.delete(event.target.value);
      updateFilterCount();
      render();
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".filter-menu")) {
        el.filterPopover.classList.remove("open");
        el.filterButton.setAttribute("aria-expanded", "false");
      }
    });

    async function initialize() {
      try {
        const response = await fetch(DATA_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        state.data = await response.json();
        if (!state.data.rows || !state.data.rows.length) {
          el.matrix.innerHTML = '<div class="empty-state"><strong>金利データがありません</strong>データが蓄積されると、ここに履歴が表示されます。</div>';
          return;
        }
        el.demoFlag.hidden = !state.data.is_demo;
        buildTypeChips();
        buildBankFilters();
        render();
      } catch (_e) {
        el.matrix.innerHTML = '<div class="empty-state"><strong>データを読み込めませんでした</strong>HTTPサーバー経由で開いているか、data/rate-history.json があるかご確認ください。</div>';
      }
    }

    initialize();
  </script>
</body>
</html>
